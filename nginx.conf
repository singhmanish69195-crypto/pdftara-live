server {
    listen 80;
    # 1. LOCALHOST KO BADAL KAR APNA DOMAIN DAALEIN
    server_name https://www.pdftara.com https://www.pdftara.com; 

    # Point to build output directory
    root /website/PDFTara;
    index index.html;

    # ==========================================
    # Gzip Compression Settings
    # ==========================================
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types 
        text/plain 
        text/css 
        application/json 
        application/javascript 
        text/xml 
        application/xml 
        application/xml+rss 
        text/javascript 
        image/svg+xml 
        application/wasm;

    # ==========================================
    # MIME Type Configuration
    # ==========================================
    include /etc/nginx/mime.types;
    types {
        application/wasm wasm;
    }

    # ==========================================
    # Security Headers (YAHAN BADLAV KIYA HAI)
    # ==========================================
    add_header X-Content-Type-Options "nosniff" always;
    
    # Isse iframe block nahi hoga (SameOrigin zaroori hai)
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Modern browsers ke liye ye line add kar raha hoon (Best Practice)
    add_header Content-Security-Policy "frame-ancestors 'self' https://www.pdftara.com https://www.pdftara.com;" always;

    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ==========================================
    # Caching Strategy
    # ==========================================

    location ~* \.(ico|jpg|jpeg|png|gif|svg|webp|avif|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ==========================================
    # Core Routing Logic
    # ==========================================
    
    location / {
        try_files $uri $uri.html $uri/ =404;
        add_header Cache-Control "public, max-age=0, must-revalidate";
        
        # Yahan bhi frame headers repeat kar diye hain safety ke liye
        add_header X-Frame-Options "SAMEORIGIN" always;
    }
}